name: Release

permissions:
  contents: write

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-rc[0-9]+"

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/create-gh-release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  upload-assets:
    needs: create-release
    strategy:
      matrix:
        include:
          # macOS targets (with Metal GPU acceleration)
          - target: aarch64-apple-darwin
            os: macos-latest
            suffix: metal
            # Disable GGML_NATIVE to prevent i8mm detection on M2/M3 runners
            # See: https://github.com/ggml-org/whisper.cpp/issues/3427
            # whisper-rs-sys passes CMAKE_* env vars to cmake
            cmake_c_flags: "-march=armv8.5-a"
            cmake_cxx_flags: "-march=armv8.5-a"
          - target: x86_64-apple-darwin
            os: macos-latest
            suffix: metal

          # Linux targets (statically linked, CPU-only)
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            suffix: cpu
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            suffix: cpu
            # Use cargo-zigbuild instead of cross-rs
            # cross-rs GCC 9.2 lacks vld1q_s8_x4 NEON intrinsics needed by ggml
            # Zig uses LLVM which has proper NEON support
            # See: https://github.com/ggerganov/llama.cpp/issues/4827
            build_tool: cargo-zigbuild

          # Windows targets (CPU-only)
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            suffix: cpu

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/upload-rust-binary-action@v1
        env:
          # whisper-rs-sys passes CMAKE_* env vars to cmake
          CMAKE_C_FLAGS: ${{ matrix.cmake_c_flags }}
          CMAKE_CXX_FLAGS: ${{ matrix.cmake_cxx_flags }}
        with:
          bin: dialog_detective
          target: ${{ matrix.target }}
          archive: dialog_detective-$tag-$target-${{ matrix.suffix }}
          build-tool: ${{ matrix.build_tool }}
          token: ${{ secrets.GITHUB_TOKEN }}
